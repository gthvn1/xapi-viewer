# bacon.toml
default_job = "test"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--color", "always", "--", "--color", "always"]
need_stdout = true

[jobs.run]
command = ["cargo", "run", "--color", "always", "--", "samples/xensource.log"]
need_stdout = true
allow_warnings = true
